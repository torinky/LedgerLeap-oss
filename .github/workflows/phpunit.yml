name: Laravel CI (PHPUnit / Pest)

on:
  push:
    branches:
      - 'main'
      - 'develop'
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_ACTIONS: true
  DB_USERNAME: sail
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_DATABASE: ledgerleap_test
  MAIL_FROM_ADDRESS: info@example.com

# ───────────────────────────────────────────────
# 共通セットアップは .github/actions/laravel-test-setup/action.yml に集約
# 各ジョブは uses: ./.github/actions/laravel-test-setup で呼び出す（Sprint 3）
# ───────────────────────────────────────────────
jobs:

  # ── ① Unit テスト（parallel 標準・外部サービス不要・高速） ──────────────────
  unit:
    name: Unit Tests (parallel)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mysql:
        image: groonga/mroonga:mysql-8.0-latest
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: ledgerleap_test
          MYSQL_USER: sail
          MYSQL_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_ALLOW_EMPTY_PASSWORD: 1
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 15s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Laravel Test Setup
        uses: ./.github/actions/laravel-test-setup
        with:
          db_password: ${{ secrets.DB_PASSWORD }}

      - name: Run Unit Tests (parallel)
        # external グループ（外部コンテナ依存）は除外する
        # database-migrations グループ（DatabaseMigrations使用・他テストのDB状態を破壊）は除外する
        # --display-errors でスタックトレースを出力（デバッグ用）
        run: ./vendor/bin/pest --parallel --configuration=phpunit.parallel.xml --testsuite=Unit --exclude-group=external --exclude-group=database-migrations --display-errors

  # ── ② Feature 追加並列テスト（parallel-safe subset） ────────────────
  feature-parallel:
    name: Feature Tests (parallel subset)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mysql:
        image: groonga/mroonga:mysql-8.0-latest
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: ledgerleap_test
          MYSQL_USER: sail
          MYSQL_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_ALLOW_EMPTY_PASSWORD: 1
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 15s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Laravel Test Setup
        uses: ./.github/actions/laravel-test-setup
        with:
          db_password: ${{ secrets.DB_PASSWORD }}

      - name: Run Feature Tests (parallel subset)
        # Livewire / Services の parallel-safe なサブセットのみを並列実行する
        # --display-errors でスタックトレースを出力（デバッグ用）
        run: ./vendor/bin/pest --parallel --configuration=phpunit.parallel.xml --testsuite=FeatureParallelSubset --exclude-group=external --exclude-group=database-migrations --display-errors

  # ── ③ Feature 直列残余テスト（parallel に出していないもの） ────────────────
  feature:
    name: Feature Tests (serial remainder)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      mysql:
        image: groonga/mroonga:mysql-8.0-latest
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: ledgerleap_test
          MYSQL_USER: sail
          MYSQL_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_ALLOW_EMPTY_PASSWORD: 1
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 15s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Laravel Test Setup
        uses: ./.github/actions/laravel-test-setup
        with:
          db_password: ${{ secrets.DB_PASSWORD }}

      - name: Run Feature Tests (serial remainder)
        # database-migrations / external は別ジョブへ分離済み
        # FeatureSerial は parallel-safe subset を除外した残余だけを実行する
        run: ./vendor/bin/pest --testsuite=FeatureSerial --exclude-group=external --exclude-group=database-migrations --display-errors

  # ── ④ DatabaseMigrations テスト（migrate:fresh が必要なテスト群） ──────
  #
  # 実行対象（`#[Group('database-migrations')]` を付与したテストのみ）:
  #   - FolderTest                    (マルチテナント境界の検証)
  #   - SearchApiTest                 (Mroonga 検索API統合)
  #   - LedgerFullTextSearchTest      (Mroonga 全文検索 - トランザクションロールバック不可)
  #   - SearchControllerAdditionalTest (全文検索コントローラ)
  #
  # なぜ分離するか:
  #   DatabaseMigrations は tearDown() で migrate:rollback を実行し全テーブルをdropする。
  #   これが同一プロセス内の RefreshDatabaseWithTenant 使用テストの DB 状態を破壊するため、
  #   独立したジョブ（独立したプロセス・コンテナ）で実行する必要がある。
  #
  db-migrations:
    name: DB Migrations Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mysql:
        image: groonga/mroonga:mysql-8.0-latest
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: ledgerleap_test
          MYSQL_USER: sail
          MYSQL_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_ALLOW_EMPTY_PASSWORD: 1
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 15s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Laravel Test Setup
        uses: ./.github/actions/laravel-test-setup
        with:
          db_password: ${{ secrets.DB_PASSWORD }}

      - name: Run DB Migrations Tests
        # DatabaseMigrations を使うテストのみ実行する
        # このジョブは独立したコンテナで実行されるため migrate:rollback による他テストへの影響なし
        # --display-errors でスタックトレースを出力（デバッグ用）
        run: ./vendor/bin/pest --group=database-migrations --display-errors
