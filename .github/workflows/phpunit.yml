name: Laravel Sail with Mroonga Debug

on:
  push:
    branches:
      - 'main'
  pull_request:
  workflow_dispatch:

env:
  DB_USERNAME: sail
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  # テスト用DBはledgerleap_testを使用（tests/Pest.phpのセーフガード回避のため）
  DB_DATABASE: ledgerleap_test
  MAIL_FROM_ADDRESS: info@example.com

jobs:
  phpunit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      mysql:
        image: groonga/mroonga:mysql-8.0-latest
        ports:
          - 3306:3306
        env:
          # テスト用DB名で初期化（ledgerleapはPest.phpにブロックされるため使用不可）
          MYSQL_DATABASE: ledgerleap_test
          MYSQL_USER: ${{ env.DB_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_ALLOW_EMPTY_PASSWORD: 1
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 15s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, pdo_mysql
          tools: composer:v2

      - name: Cache Vendor dependencies
        id: cache-vendor
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        if: steps.cache-vendor.outputs.cache-hit != 'true'
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Vite 7.x は Node.js 20+ を要求
          node-version: '20'

      - name: Cache Node.js modules
        uses: actions/cache@v4
        id: node-cache
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Frontend Dependencies
        working-directory: ./
        run: npm ci

      - name: Build Frontend Assets
        working-directory: ./
        run: npm run build

      - name: Laravel Setting
        run: |
          cp .env.example .env
          # CI環境にはRedisがないため、キャッシュ/セッション/キューをメモリ/同期に上書き
          sed -i 's/^CACHE_DRIVER=.*/CACHE_DRIVER=array/' .env
          sed -i 's/^SESSION_DRIVER=.*/SESSION_DRIVER=array/' .env
          sed -i 's/^QUEUE_CONNECTION=.*/QUEUE_CONNECTION=sync/' .env
          # DB接続もCI用に統一
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=ledgerleap_test/' .env
          php artisan optimize:clear
          php artisan config:clear
          php artisan view:clear
          php artisan route:clear
          git config --local core.fileMode false
          chmod -R 777 storage bootstrap/cache

      - name: Generate key
        run: php artisan key:generate --env=testing

      - name: Grant database privileges
        env:
          MYSQL_PWD: ${{ secrets.DB_PASSWORD }}
        run: |
          mysql -h 127.0.0.1 -u root --force <<EOF
            CREATE DATABASE IF NOT EXISTS ledgerleap_test;
            GRANT ALL PRIVILEGES ON ledgerleap_test.* TO '${{ env.DB_USERNAME }}'@'%';
            FLUSH PRIVILEGES;
          EOF

      - name: Migrate database
        run: php artisan migrate --force


      - name: Run tests
        run: ./vendor/bin/pest
