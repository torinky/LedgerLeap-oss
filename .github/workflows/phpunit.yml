name: Laravel Sail with Mroonga Debug

on:
  push:
  pull_request:

env:
  DB_USERNAME: sail
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  MAIL_FROM_ADDRESS: info@example.com

jobs:
  phpunit:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: groonga/mroonga:mysql-8.0-latest
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: ledgerleap
          MYSQL_USER: ${{ env.DB_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, pdo_mysql
          tools: composer:v2

      - name: Copy .env.example and Edit
        run: |
          cp .env.example .env
          sed -i "s/APP_ENV=local/APP_ENV=testing/g" .env
          sed -i "s/DB_HOST=127.0.0.1/DB_HOST=mysql/g" .env
          sed -i "s/DB_USERNAME=root/DB_USERNAME=sail/g" .env
          sed -i "s/DB_PASSWORD=/DB_PASSWORD=${{ secrets.DB_PASSWORD }}/g" .env
          sed -i "s/CACHE_DRIVER=file/CACHE_DRIVER=array/g" .env
          sed -i "s/SESSION_DRIVER=file/SESSION_DRIVER=array/g" .env
          sed -i "s/QUEUE_CONNECTION=sync/QUEUE_CONNECTION=sync/g" .env
          sed -i "s/MAIL_MAILER=smtp/MAIL_MAILER=array/g" .env

      - name: Check OS Environment Variables
        run: env

      - name: Check PHP Version and Configuration
        continue-on-error: true
        run: |
          php -v
          php -n -i | grep "Loaded Configuration File" # -n オプションを追加
          php -n -i | grep "variables_order"
          php -n -i | grep "register_globals"
          php -i | grep extension_dir # extension_dir を確認

      - name: Check .env Content
        run: cat .env

      - name: Check PHP Environment Variables (Crucial Debug)
        continue-on-error: true
        run: |
          php -r "var_dump(getenv('DB_HOST')); var_dump(getenv('DB_DATABASE')); var_dump(getenv('APP_ENV'));"
          php -r "print_r($_ENV);"
          php -r "print_r($_SERVER);"

      - name: Check Composer Autoload
        run: |
          COMPOSER_BIN=$(which composer)
          if [ -n "$COMPOSER_BIN" ]; then
              echo "Composer found: $COMPOSER_BIN"
              ls -l vendor/autoload.php
          else
              echo "Composer not found"
          fi
      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Generate key
        run: php artisan key:generate --env testing

      - name: Set hostname
        run: sudo echo "127.0.0.1 mysql" | sudo tee -a /etc/hosts

      - name: Grant database privileges
        env:
          MYSQL_PWD: ${{ secrets.DB_PASSWORD }}
        run: |
          mysql -h mysql -u root --force <<EOF
            GRANT ALL PRIVILEGES ON ledgerleap.* TO '${{ env.DB_USERNAME }}'@'%';
            FLUSH PRIVILEGES;
            CREATE DATABASE IF NOT EXISTS ledgerleap;
          EOF

      - name: Clear Config Cache
        run: php artisan config:clear

      - name: Execute tests (Unit and Feature tests) via PHPUnit
        working-directory: ${{ github.workspace }}
        if: always()
        run: vendor/bin/phpunit
      - name: ディレクトリ構造の確認
        run: ls -lR ${{ github.workspace }}
