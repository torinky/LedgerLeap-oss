name: Laravel

on:
  push:
  pull_request:

env:
  DB_USERNAME: sail
  DB_PASSWORD: password
  MAIL_FROM_ADDRESS: info@example.com

jobs:
  phpunit:

    runs-on: ubuntu-latest

    services:
      mysql.test:
        image: 'groonga/mroonga:mysql-8.0-latest'
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: 'ledgerleap'
          MYSQL_USER: ${{ env.DB_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.DB_PASSWORD }} #  シークレットを使用
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }} #  シークレットを使用
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - name: Copy .env
        run: cp .env.example .env.testing
      - name: Install Dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      - name: Generate key
        run: php artisan key:generate --env testing
      - name: Set hostname
        run: sudo echo "127.0.0.1 mysql.test" | sudo tee -a /etc/hosts
      - name: Grant database privileges
        run: |
          echo "$DB_PASSWORD" | mysql -h mysql.test -u root --force <<EOF
            GRANT ALL PRIVILEGES ON testing.* TO sail@'%';
            FLUSH PRIVILEGES;
          EOF
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      - name: Execute tests (Unit and Feature tests) via PHPUnit
        run: vendor/bin/phpunit
