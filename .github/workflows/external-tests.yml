name: External Service Tests (Nightly)

# external グループ: VLM / LDAP / Embedding 等の外部コンテナが必要なテスト
# 理由: 外部サービスコンテナが不要な通常CI（phpunit.yml）では除外されているため、
#       夜間スケジュールと手動実行（workflow_dispatch）でのみ実行する。
#
# 対象テスト（#[Group('external')] 付与）:
#   - LdapRealConnectionTest   (OpenLDAP コンテナ必要)
#   - VlmTestBase / 各 VlmTest (PaddleOCR-VL コンテナ必要)
#   - RagPerformanceTest       (Embedding コンテナ必要)
#
# 注意: このワークフローは外部コンテナを別途起動できる環境（self-hosted runner 等）が
#       整備されるまでは手動実行（workflow_dispatch）のみで運用する。
#       外部サービスが利用可能になったら schedule を有効化する。

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 20 * * *'  # 毎日 JST 5:00 (UTC 20:00) に実行
  #   - cron: '0 20 * * 0'  # 毎週日曜 JST 5:00 に限定する場合

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # 夜間実行は途中キャンセルしない

env:
  GITHUB_ACTIONS: true
  DB_USERNAME: sail
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_DATABASE: ledgerleap_test
  MAIL_FROM_ADDRESS: info@example.com

jobs:

  # ── external テスト（外部サービスコンテナが起動している前提） ──
  external:
    name: External Service Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 外部サービス依存のため余裕を持たせる
    services:
      mysql:
        image: groonga/mroonga:mysql-8.0-latest
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: ledgerleap_test
          MYSQL_USER: sail
          MYSQL_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_ALLOW_EMPTY_PASSWORD: 1
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 15s
          --health-timeout 5s
          --health-retries 10
      # TODO: 以下のサービスは self-hosted runner または GitHub-hosted GPU ランナーで有効化する
      # embedding:
      #   image: ledgerleap/embedding:latest
      #   ports:
      #     - 8000:8000
      # paddleocr-vl:
      #   image: ledgerleap/paddleocr-vl:latest
      #   ports:
      #     - 8080:8080

    steps:
      - uses: actions/checkout@v4

      - name: Laravel Test Setup
        uses: ./.github/actions/laravel-test-setup
        with:
          db_password: ${{ secrets.DB_PASSWORD }}

      - name: Run External Service Tests
        # external グループのみ実行（外部コンテナ依存テスト）
        # --display-errors でスタックトレースを出力
        run: ./vendor/bin/pest --group=external --display-errors

