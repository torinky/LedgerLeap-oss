name: Create Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect prerelease
        id: meta
        run: |
          if echo "${{ github.ref_name }}" | grep -qE -- '-(alpha|beta|rc)'; then
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n "/^${{ github.ref_name }}$/{n;p;}")
          if [ -z "$PREV_TAG" ]; then
            {
              echo '## v${{ github.ref_name }}'
              echo ''
              echo '初回 Alpha プレリリースです。'
              echo ''
              echo '### 含まれる変更'
              echo ''
              git log --oneline --no-merges -50
            } > /tmp/release-notes.md
          else
            {
              echo '## Changes since ${{ github.ref_name }}'
              echo ''
              git log "${PREV_TAG}..${{ github.ref_name }}" --oneline --no-merges | sed 's/^/- /'
            } > /tmp/release-notes.md
          fi

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md \
            ${{ steps.meta.outputs.flag }}
        env:
          GH_TOKEN: ${{ github.token }}
