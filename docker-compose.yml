services:
  laravel:
    build:
      context: ./vendor/laravel/sail/runtimes/8.4
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP}'
    image: sail-8.4/app
    ports:
      - '${APP_PORT:-80}:80'
      - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
    environment:
      WWWUSER: '${WWWUSER}'
      LARAVEL_SAIL: 1
      XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
      XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
      IGNITION_LOCAL_SITES_PATH: '${PWD}'
    volumes:
      - '.:/var/www/html'
    networks:
      - sail
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      tika:
        condition: service_started
  queue:
    build:
      context: ./docker/app
      dockerfile: DockerfileQueue
      args:
        WWWGROUP: '${WWWGROUP}'
        DOCKER_GROUP_ID: '${DOCKER_GROUP_ID}'
    image: sail-8.4/app-queue
    # Phase5: Use supervisor to manage multiple queue workers
    command: ["/usr/bin/supervisord", "-c", "/etc/supervisor/conf.d/supervisord.conf"]
    environment:
      WWWUSER: '${WWWUSER}'
      WWWGROUP: '${WWWGROUP}'
      DOCKER_GROUP_ID: "${DOCKER_GROUP_ID}"
      LARAVEL_SAIL: 1
      XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
      XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
      IGNITION_LOCAL_SITES_PATH: '${PWD}'
      LOG_CHANNEL: 'queue'
    group_add:
      - '${DOCKER_GROUP_ID}'
    volumes:
      - '.:/var/www/html'
      - '/var/run/docker.sock:/var/run/docker.sock'
    networks:
      - sail
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      tika:
        condition: service_started
      embedding:
        condition: service_healthy
    #            - mysql
    #            - redis
    #            - tika
    restart: on-failure

  # --- scheduler サービス ---
  scheduler:
    build:
      context: ./vendor/laravel/sail/runtimes/8.4
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP}'
    image: sail-8.4/app
    volumes:
      - .:/var/www/html
    command: [ "php", "/var/www/html/artisan", "schedule:work", "--no-interaction" ]
    environment:
      WWWUSER: '${WWWUSER}'
      LARAVEL_SAIL: 1
      XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
      XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
      IGNITION_LOCAL_SITES_PATH: '${PWD}'
      LOG_CHANNEL: 'scheduler'
    networks:
      - sail
    depends_on:
      mysql:
#        condition: service_started
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

    # --- 追加: 定期的な再起動のためのヘルスチェックと連動 (例: 12時間ごと) ---
    # ヘルスチェックは単純なプロセス存在確認などでも良いが、ここでは restart をシンプルに使う
    # deploy: # deploy キーは swarm mode 用なので、ここでは使えない
    #   restart_policy:
    #     condition: on-failure # or any
    #     delay: 5s
    #     max_attempts: 3
    #     window: 120s
    # 上記の代わりに docker-compose の機能ではないが、ホストの cron などで
    # ./vendor/bin/sail restart scheduler を定期実行する方法がある。
    # または、簡易的にコンテナ自身のヘルスチェックで再起動を促す (ややハック的)
    # healthcheck:
    #   test: ["CMD", "pgrep", "-f", "schedule:work"] # プロセスが存在するかチェック
    #   interval: 12h # 12時間ごとにチェック
    #   timeout: 10s
    #   retries: 3
    #   start_period: 1m # 起動後1分待つ
    # restart: unless-stopped # ヘルスチェック失敗時などに再起動 (always でも良い)
    # --- ここまで追加 ---


  mysql:
    image: 'groonga/mroonga:mysql-8.0-latest'
    ports:
      - '${FORWARD_DB_PORT:-3306}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - 'sail-mysql:/var/lib/mysql'
      - './vendor/laravel/sail/database/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
      - './docker/mysql/init:/docker-entrypoint-initdb.d'
      - './docker/mroonga/my.cnf/mroonga.cnf:/etc/mysql/conf.d/mroonga.cnf'
    networks:
      - sail
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}" ]
      retries: 3
      timeout: 5s

  redis:
    image: 'redis:alpine'
    ports:
      - '${FORWARD_REDIS_PORT:-6379}:6379'
    volumes:
      - 'sail-redis:/data'
    networks:
      - sail
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      retries: 3
      timeout: 5s
  meilisearch:
    image: 'getmeili/meilisearch:latest'
    ports:
      - '${FORWARD_MEILISEARCH_PORT:-7700}:7700'
    volumes:
      - 'sail-meilisearch:/meili_data'
    networks:
      - sail
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - 'http://localhost:7700/health'
      retries: 3
      timeout: 5s
  mailpit:
    image: 'axllent/mailpit:latest'
    ports:
      - '${FORWARD_MAILPIT_PORT:-1025}:1025'
      - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
    networks:
      - sail
  selenium:
    image: seleniarm/standalone-chromium
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - '/dev/shm:/dev/shm'
    networks:
      - sail
  tika:
    image: apache/tika:latest
    ports:
      - 9998:9998
    #        command: -c /tika-config.xml
    #        command: [ '-Xmx4g', '-c', '/tika-config.xml' ]  # メモリ割当最適化
    restart: on-failure
    volumes:
      - './docker/tika/tika-config.xml:/tika-config.xml'
    networks:
      - sail
  ocrmypdf:
    build:
      context: ./docker/ocrmypdf
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    entrypoint: []
    command: tail -f /dev/null
    restart: unless-stopped
    networks:
      - sail
  embedding:
    build:
      context: ./docker/embedding
      dockerfile: Dockerfile
    volumes:
      - ./storage/app/embedding:/app/models
    environment:
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-cl-nagoya/ruri-v3-310m}
      - USE_ONNX=${EMBEDDING_USE_ONNX:-false}
      - CPU_THREADS=${EMBEDDING_CPU_THREADS:-4}
      - EMBEDDING_BATCH_SIZE=${RAG_BATCH_SIZE:-1}
      - RAG_NUM_THREADS=${RAG_NUM_THREADS:-0}
      - RAG_NUM_INTEROP_THREADS=${RAG_NUM_INTEROP_THREADS:-0}
      - RAG_CONVERT_TO_NUMPY=${RAG_CONVERT_TO_NUMPY:-true}
      - RAG_DEVICE=${RAG_DEVICE:-cpu}
    networks:
      - sail
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000", "--timeout-keep-alive", "300"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 300s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 2G

  vlm:
    build:
      context: ${VLM_SERVICE_CONTEXT:-./docker/paddle} # Use environment variable to switch context, default to paddle
      dockerfile: Dockerfile
      args:
        PADDLE_VERSION: cpu
    ports:
      - "${VLM_SERVICE_PORT:-8001}:8000"
    volumes:
      # Note: vlm-cache volume disabled for MinerU (models baked into image)
      # For PaddleOCR/Marker, models are small enough to download at runtime
      - .:/var/www/html
    environment:
      - PYTHONUNBUFFERED=1
      - VLM_MODEL=${VLM_MODEL:-paddleocr}
      - PADDLEOCR_DEVICE=${PADDLEOCR_DEVICE:-cpu}
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 10G
        reservations:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s # Model download can be slow
    networks:
      - sail

networks:
  sail:
    driver: bridge
volumes:
  sail-mysql:
    driver: local
  sail-redis:
    driver: local
  sail-meilisearch:
    driver: local
