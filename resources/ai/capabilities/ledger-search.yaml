id: ledger-search
version: 1
status: active
summary: 台帳をキーワード・意味・メタデータで検索し、関連情報を読むための基本能力
primary_user_goals:
  - 台帳を探したい
  - 類似記録を参照したい
  - いま見ている記録に関連する別レコードを辿りたい
  - 担当者や更新状況を知りたい
when_to_use:
  - ユーザーが特定の台帳、会社名、案件名、日付範囲、タグで絞り込みたいとき
  - ユーザーがタグ名の断片、フォルダ名の断片、台帳名の断片で絞り込みたいとき
  - ユーザーが folder_id / ledgerDefineId を知らないため、先に候補一覧から ID を探したいとき
  - ユーザーがタグ断片を候補一覧で先に絞り込みたいとき
  - ユーザーが自然文や同義語で関連情報を探したいとき
  - ユーザーが業務用語や技術用語を含めて検索語を調整したいとき
  - ユーザーが同義語や技術用語の候補だけを先に確認したいとき
  - ユーザーが単一レコード詳細から関連レコード候補を調べたいとき
  - ユーザーが複数添付レコードの一覧で、添付数や添付ごとの識別子を先に把握したいとき
recommended_flow:
  - step: lookup-ids
    description: folder_id / ledgerDefineId が不明なら、まず候補一覧から ID を探す。フォルダ・台帳定義・タグは正式名の断片で候補を絞り、使える ID を確認してから検索に進む
  - step: fragment-search
    description: 正式名を覚えていない場合は、タグ / フォルダ / 台帳の断片から候補を絞り、必要なら GetSearchTermsTool と SearchLedgersTool を組み合わせて検索語を組み立てる
  - step: term-search
    description: 曖昧な語や業務用語の候補を確認したい場合は GetSearchTermsTool で同義語 / 技術用語候補を取り出し、次に SearchLedgersTool で q を組み立てる
  - step: keyword-search
    description: まず SearchLedgersTool で会社名・案件名・タグ・日付などの分かっている条件から絞り込む。MCP では search_trace で original_q / selected_terms / kind を確認できる
  - step: inspect-meta
    description: 候補が見つかったら meta から作成者・保存先・台帳種別を確認し、次に見る対象を絞る
  - step: record-related-search
    description: 単一レコードを起点に関連候補を見たい場合は GetRelatedLedgersTool で関連記録をたどる
  - step: semantic-search
    description: キーワード結果が不十分なら order_by=semantic_score を使い、自然文で意味検索する
  - step: pivot-to-activity-log
    description: それでも不足なら GetActivityLogTool で手がかりを探し、再検索する
  - step: narrow-response
    description: まず一覧や件数だけ見たい場合は include_content=false や mode=count で軽い応答を優先する
required_mcp_tools:
  - SearchLedgersTool
  - GetRelatedLedgersTool
optional_mcp_tools:
  - GetTagsTool
  - GetSearchTermsTool
  - GetLedgerDetailTool
  - GetActivityLogTool
required_rest_endpoints:
  - method: GET
    path: /api/v1/search
  - method: POST
    path: /api/v1/search
required_guides:
  - ledgerleap://guides/search-strategy
  - ledgerleap://guides/common-usage-basics
key_parameters:
  - q
  - q（同義語展開あり）
  - tags
  - tags（lookup-first 候補あり）
  - exclude_q
  - exclude_tags
  - folder_id
  - folder_id（lookup-first 候補配列あり）
  - ledger_define_id
  - ledger_define_id（lookup-first 候補配列あり）
  - creator_id
  - created_from
  - created_to
  - mode
  - limit
  - offset
  - include_content
  - order_by
  - attachment_count
  - attachments
  - routes
  - attachments.payloads
success_criteria:
  - 必要な台帳候補を絞り込める
  - folder_id / ledgerDefineId が不明でも、候補一覧から ID を見つけて検索に進める
  - 断片的なタグ名、フォルダ名、台帳名から候補を絞れる
  - 検索結果の meta から担当者・保存先・台帳種別を読み取り、次の確認対象を決められる
  - 単一レコードから関連候補を理由付きで確認できる
  - 必要に応じて meta から作成者・フォルダ・台帳定義を読める
  - 「重要」な対象をタグ指定またはスコア順のどちらでも追える
  - 不要に大きいレスポンスを避けられる
  - 複数添付レコードでは attachment_count と attachments から、添付数・識別子・役割・順序・ソースを区別できる
  - 各添付の routes.download / routes.inspector から、ダウンロードとインスペクター起動の導線を辿れる
  - 添付ごとの `payloads.text` / `payloads.structured` / `payloads.visual` から mode 別の follow-up 契約をたどれる
ledgerleap_constraints:
  - Mroonga の MATCH AGAINST は単一カラム前提。複合インデックス前提で考えない
  - content は数値インデックス配列。カラム定義を見ずに title/body を決め打ちしない
  - "`semantic_score` を使うときは単語列よりも自然文の問い合わせを優先する"
  - "`q` は同義語データがある場合に展開されるため、現場用語・言い換え・略称を自然文として入力できる"
  - 技術用語は同義語と別扱いで候補化されるため、業務に慣れている場合は正式語をそのまま入れてよい
  - MCP 応答の search_trace から original_q / normalized_q / selected_terms / excluded_terms を確認し、必要なら次の q を調整する
  - include_content=false や mode=count を使って段階的に情報取得する
  - 「重要」な対象は tags='重要' の明示検索と、スコア順での優先確認を使い分ける
  - "`tags` と `folder_id` / `ledger_define_id` は直接絞り込みに使えるが、断片入力は lookup-first で候補配列に解決してから渡す"
  - タグ名の部分一致を前提にしすぎず、まずは `GetTagsTool` / `GetFoldersTool` / `GetLedgerDefinesTool` で候補を確認する
  - 複数添付の見え方を改善する場合は、`attachments` の `attachment_id` / `filename` / `role` / `order` / `source` を優先して読む
  - ファイルを開く導線が必要な場合は `routes.download` と `routes.inspector` を併せて読む
  - mode ごとの follow-up 契約が必要な場合は `attachments[].payloads.text` / `structured` / `visual` を読む
examples:
  - user: 昨日私が作成した日報を見せて
    intent: 作成者と日付で絞った検索
  - user: A社との最近のやり取りを教えて
    intent: まずキーワード、必要なら意味検索
  - user: 重要度の高い案件を先に見せて
    intent: タグ指定またはスコア順で重要案件を確認
  - user: この設備点検記録に関連する保守依頼や過去事例を見せて
    intent: 単一レコード詳細を起点に関連レコードをたどる
