id: ledger-update
version: 2
status: active
summary: 既存の記録を確認し、必要な項目だけを安全に更新する能力
primary_user_goals:
  - 既存台帳の一部項目を修正したい
  - 検索結果から対象を選び、内容を更新したい
  - AI 提案を確認してから変更を反映したい
when_to_use:
  - ユーザーが既存レコードの訂正・追記を求めるとき
  - ユーザーがタグ変更を求め、現契約では未対応であることも含めて案内すべきとき
  - 検索の次のアクションとして更新が必要なとき
recommended_flow:
  - step: identify-target
    description: まず検索結果や現在の文脈から対象候補を絞る
  - step: read-current-record
    description: 単一レコードの read path で最新内容・状態・可視性を確認する
  - step: check-editability
    description: 現在の状態で編集できるか、保存時に状態が戻るかを確認する
  - step: inspect-schema
    description: GetLedgerDefinesTool で対象定義の column_define を確認する
  - step: build-patch
    description: どの column id をどう変更するか content_patch を構築する
  - step: preview-diff
    description: 適用前に変更要約または dry_run で差分を確認する
  - step: apply-patch
    description: UpdateLedgerTool または Update API で必要項目だけ更新する
  - step: confirm-result
    description: 更新後の主要項目、状態変化、再提出要否を確認する
required_mcp_tools:
  - GetLedgerDetailTool
  - UpdateLedgerTool
supporting_mcp_tools:
  - SearchLedgersTool
  - GetLedgerDefinesTool
  - GetWorkflowHistoryTool
planned_rest_endpoints:
  - method: GET
    path: /api/v1/ledgers/{ledger}
  - method: PATCH
    path: /api/v1/ledgers/{ledger}
deferred_rest_endpoints:
  - method: PUT
    path: /api/v1/ledgers/{ledger}
required_guides:
  - ledgerleap://guides/update-strategy
  - ledgerleap://guides/common-usage-basics
proposed_inputs:
  - ledger_id
  - content_patch
  - comment
  - tag_operation
  - tag_values
  - dry_run
success_criteria:
  - 更新前に単一レコードの最新内容と編集可否を確認できる
  - 対象レコードの誤認なく更新できる
  - 更新差分を要約して確認できる
  - 変更理由と差分を追跡できる
  - 権限・テナント・ワークフロー制約を破らない
  - 承認待ち中の編集では状態が DRAFT に戻ることを利用者へ説明できる
ledgerleap_constraints:
  - content は数値インデックス配列。人間向けラベルから直接更新しない
  - API / MCP の初期公開契約では PATCH を主契約とし、部分更新を前提にする
  - フォルダ権限と対象レコード可視性を両方確認する
  - PENDING_INSPECTION / PENDING_APPROVAL の更新は保存後に DRAFT へ戻る前提で扱う
  - APPROVED 状態は初期公開契約では原則更新不可として扱う
  - tag_operation / tag_values は受け取れても、初期 MCP 更新契約では明示的に未対応として返す
  - モデルイベント依存のケースでは update([...]) ベースの反映を優先する
open_questions:
  - タグ更新を初期公開契約の次段階でどう実更新へ拡張するか
  - 楽観的排他（expected_version など）をどの段階で導入するか
  - bootstrap discovery で ledger-update をどの bundle に含めるか
examples:
  - user: さっきの議事録の開催場所だけ会議室Bに直して
    intent: 検索結果から単一列更新
  - user: A社案件の優先度タグを高に変更して
    intent: 対象特定後のタグ変更

