name: LedgerLeap Doc Packet Local Model
version: 0.0.1
schema: v1

models:
  - name: LedgerLeap Gemma4 26B
    provider: openai
    # Replace with the exact model id returned by LM Studio GET /v1/models
    model: __LM_STUDIO_MODEL_ID__
    apiBase: http://127.0.0.1:1234/v1
    apiKey: lm-studio
    capabilities:
      - tool_use
    defaultCompletionOptions:
      contextLength: 32768
      maxTokens: 4096

mcpServers:
  - name: ledgerleap
    command: npx
    args:
      - "-y"
      - "mcp-remote"
      - "https://your-server.example.com/mcp/ledgerleap"
      - "--header"
      - "Authorization:Bearer ${LEDGERLEAP_TOKEN}"
    env:
      LEDGERLEAP_TOKEN: your-sanctum-token-here
    connectionTimeout: 10000

rules:
  - uses: file:///ABSOLUTE_PROJECT_PATH/.continue/rules/01-doc-packet-core.md
  - uses: file:///ABSOLUTE_PROJECT_PATH/.continue/rules/02-doc-packet-comment-sync.md

prompts:
  - name: packet-plan
    description: Route one packet and prepare its handoff without doing the rewrite
    prompt: |
      Choose the inventory refresh lane or packet rewrite lane for one LedgerLeap packet.
      Keep REST API and MCP contract separate.
      Select one doc_format_profile, required sections, evidence fields, and comment sync scope.
      Do not perform the public-doc rewrite in this step.
      Return a packet handoff using docs/templates/doc-publication-packet-template.md.
  - name: packet-rewrite
    description: Execute one already-selected packet with a single writer
    prompt: |
      Rewrite exactly one LedgerLeap publication packet.

      ## Mandatory pre-flight gate (from #227)
      BEFORE any prose, read the packet handoff and confirm ALL these fields are populated:
      packet_id, feature_family, doc_area, target_path, public_classification,
      source_status, audience, doc_type, doc_format_profile, source_paths (1-5),
      code_anchors (2-8 in path:line), test_anchors (1-5 in path:line),
      comment_anchors (0-5), comment_sync_policy, must_exclude (1-6),
      external_evidence_urls (≥1), last_confirmed_at, recheck_after, done_when (3-5).
      If any field is missing, STOP and report the gap — do NOT proceed to writing.

      ## After gate passes
      - Confirm doc_format_profile and copy required/optional sections from docs/templates/doc-publication-packet-template.md
      - Write only the public doc body using the selected profile's required sections
      - Do not embed packet tracking metadata in the public doc body — keep it in the handoff record
      - Stay in a single-writer flow and do not widen scope into a fresh inventory scan
      - If comment sync applies, respect comment_sync_policy and apply the PHPDoc minimum rule
      - After writing, run post-validation: section compliance, anchor resolution, must-exclude, freshness, comment sync
  - name: packet-comment-sync
    description: Sync only the selected comment anchors for one packet
    prompt: |
      Update comment anchors only for the selected LedgerLeap packet.
      Assume the packet handoff is already fixed and do not rewrite the public doc body.
      Apply the playbook's PHPDoc minimum rule only to the selected anchors.
      Respect comment_sync_policy and record explicit defer reasons when comment sync is not applicable.
