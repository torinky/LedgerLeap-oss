<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LedgerLeap Poster</title>
    <style>
        :root {
            --primary: #3b82f6;
            --accent: #0ea5e9;
            --text-main: #ffffff;
            --text-sub: #cbd5e1;
            --glass-bg: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.2);
        }
        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-image: url('images/title_bg.png');
            background-size: cover;
            background-position: center;
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .poster-container {
            width: 1800px; /* Leave some margin */
            height: 980px;
            display: flex;
            flex-direction: row;
            gap: 60px;
            align-items: center;
        }

        /* Left Column: Copy & Features */
        .left-col {
            flex: 1;
            padding-left: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .brand-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .brand-logo {
            width: 80px;
            height: 80px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }
        .brand-name {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 0.05em;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        
        .badge-core {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            align-self: flex-start;
        }

        h1 {
            font-size: 5rem;
            line-height: 1.1;
            font-weight: 800;
            margin: 0 0 30px 0;
            text-shadow: 0 5px 15px rgba(0,0,0,0.6);
            letter-spacing: -0.02em;
        }
        .highlight {
            color: var(--accent);
            position: relative;
            display: inline-block;
        }

        .subtitle {
            font-size: 2rem;
            line-height: 1.6;
            color: var(--text-sub);
            margin-bottom: 60px;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Feature Grid */
        .features {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }
        .feature-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 25px 30px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .feature-icon {
            font-size: 3rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        .feature-content h3 {
            margin: 0 0 5px 0;
            font-size: 1.6rem;
            color: white;
        }
        .feature-content p {
            margin: 0;
            font-size: 1.1rem;
            color: var(--text-sub);
        }

        /* Right Column: Visuals */
        .right-col {
            flex: 1.3;
            height: 100%;
            position: relative;
            perspective: 2000px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .visual-group {
            position: relative;
            width: 100%;
            height: 800px;
            transform-style: preserve-3d;
            transform: rotateY(-10deg) rotateX(2deg);
        }

        .visual-main {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            z-index: 2;
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.5));
            border-radius: 16px;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .visual-sub-1 {
            position: absolute;
            top: 15%;
            left: -5%;
            width: 45%;
            z-index: 3;
            filter: drop-shadow(0 15px 40px rgba(0,0,0,0.4));
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            transform: translateZ(50px);
        }

        .visual-sub-2 {
            position: absolute;
            bottom: 10%;
            right: -5%;
            width: 30%;
            z-index: 3;
            filter: drop-shadow(0 15px 40px rgba(0,0,0,0.4));
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            transform: translateZ(80px);
        }

        /* Footer / Call to Action lines */
        .footer-line {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

    </style>
</head>
<body>
    <div class="poster-container">
        
        <!-- Left Column -->
        <div class="left-col">
            <div class="brand-header">
                <img src="images/icon.svg" alt="Logo" class="brand-logo">
                <div class="brand-name">LedgerLeap</div>
            </div>
            
            <h1>組織の「記憶」を<br><span class="highlight">「知能」</span>に変える。</h1>
            
            <p class="subtitle">
                現場のムダをなくし、確かなデータで組織を動かす<br>
                次世代 AI 台帳プラットフォーム
            </p>

            <div class="features">
                <!-- Feature 1 -->
                <div class="feature-card">
                    <div class="feature-icon">🔍</div>
                    <div class="feature-content">
                        <h3>直感的なハイブリッド検索</h3>
                        <p>「完全一致」×「意味理解」<br>ファイル名が分からなくても、中身で一発検索。「探す時間」をゼロへ。</p>
                    </div>
                </div>
                <!-- Feature 2 -->
                <div class="feature-card">
                    <div class="feature-icon">⚡</div>
                    <div class="feature-content">
                        <h3>現場特化のAI入力支援</h3>
                        <p>帳票構造を維持したまま、データと文字列座標を正確に抽出。<br>目視確認や転記の手間をゼロにし、システムを自動化。</p>
                    </div>
                </div>
                <!-- Feature 3 -->
                <div class="feature-card">
                    <div class="feature-icon">🛡️</div>
                    <div class="feature-content">
                        <h3>監査に耐えるガバナンス</h3>
                        <p>「5段階のアクセス制御」×「更新履歴・承認フロー」<br>情報漏洩を防ぎ、内部統制を完璧に担保。</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column -->
        <div class="right-col">
            <div class="visual-group">
                <!-- Main UI Mockup -->
                <img src="images/ui_mockup.png" class="visual-main" alt="Main UI">
                <!-- Overlapping Search Image -->
                <img src="images/search.png" class="visual-sub-1" alt="Search Feature">
                <!-- Overlapping Security Image -->
                <img src="images/security.png" class="visual-sub-2" alt="Security Feature">
            </div>
        </div>

        <div class="footer-line">
            Let's Leap with AI.
        </div>

    </div>
</body>
</html>
