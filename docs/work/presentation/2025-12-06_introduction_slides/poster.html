<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LedgerLeap Poster</title>
    <style>
        :root {
            --primary: #1e3a8a; /* Deep Blue */
            --secondary: #3b82f6; /* Blue */
            --accent: #0ea5e9; /* Cyan */
            --text-dark: #1f2937;
            --text-light: #f3f4f6;
            --bg-light: #ffffff;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .poster {
            width: 1920px;
            height: 1080px;
            background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%);
            display: flex;
            flex-direction: row;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        
        /* Left Content (Text) */
        .content-area {
            flex: 1;
            padding: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 10;
        }

        /* Right Content (Visual) */
        .visual-area {
            flex: 1.2;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Background decoration */
        }
        .visual-area::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -20%;
            width: 100%;
            height: 140%;
            background: linear-gradient(120deg, var(--primary), var(--secondary));
            transform: rotate(-10deg);
            border-radius: 50% 0 0 50%;
            z-index: 1;
        }

        .logo {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo span {
            color: var(--accent);
        }

        h1 {
            font-size: 4.5rem;
            line-height: 1.1;
            color: var(--text-dark);
            margin-bottom: 30px;
        }
        h1 strong {
            color: var(--primary);
            display: block;
        }

        .catchphrase {
            font-size: 2rem;
            color: var(--secondary);
            font-weight: 500;
            margin-bottom: 60px;
            border-left: 5px solid var(--accent);
            padding-left: 20px;
        }

        .features {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 20px;
        }
        .icon-box {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            font-size: 2rem;
            color: var(--primary);
            flex-shrink: 0;
        }
        .feature-text h3 {
            margin: 0 0 5px 0;
            font-size: 1.8rem;
            color: var(--primary);
        }
        .feature-text p {
            margin: 0;
            font-size: 1.2rem;
            color: #666;
            line-height: 1.5;
        }

        /* Mockup */
        .mockup-container {
            z-index: 10;
            width: 110%;
            margin-left: -10%;
            position: relative;
            transform: perspective(1000px) rotateY(-8deg) rotateX(2deg);
            box-shadow: 20px 30px 50px rgba(0,0,0,0.3);
            border-radius: 15px;
            overflow: hidden;
            border: 5px solid white;
        }
        .mockup-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Floating Badges */
        .badge {
            position: absolute;
            background: white;
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--primary);
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .badge-1 { top: 15%; right: 10%; animation: float 6s ease-in-out infinite; }
        .badge-2 { bottom: 20%; left: 0%; animation: float 7s ease-in-out infinite 1s; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

    </style>
</head>
<body>
    <div class="poster">
        <div class="content-area">
            <div class="logo">
                LedgerLeap<span>.</span>
            </div>
            <h1>組織の情報を<br><strong>「資産」に変える</strong></h1>
            <div class="catchphrase">
                次世代台帳管理プラットフォーム
            </div>

            <div class="features">
                <div class="feature-item">
                    <div class="icon-box">🔍</div>
                    <div class="feature-text">
                        <h3>Deep Search (全文検索)</h3>
                        <p>添付ファイル（PDF・画像）の中身まで<br>OCRで完全検索。もう情報を探さない。</p>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="icon-box">🛡️</div>
                    <div class="feature-text">
                        <h3>Secure & Audit (権限管理)</h3>
                        <p>柔軟な権限設定と完全な監査ログ。<br>「誰が・いつ」を全て可視化。</p>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="icon-box">🚀</div>
                    <div class="feature-text">
                        <h3>My Portal (マイポータル)</h3>
                        <p>「やるべきこと」が一目でわかる。<br>エントリーユーザーも迷わず操作。</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="visual-area">
            <div class="badge badge-1">⚡️ 業務効率化</div>
            <div class="badge badge-2">📁 ナレッジ蓄積</div>
            <div class="mockup-container">
                <img src="images/ui_mockup.png" alt="LedgerLeap UI Mockup">
            </div>
        </div>
    </div>
</body>
</html>
