services:
  laravel:
    build:
      context: ./vendor/laravel/sail/runtimes/8.4
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP}'
    image: sail-8.4/app
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '${APP_PORT:-80}:80'
      - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
    environment:
      WWWUSER: '${WWWUSER}'
      LARAVEL_SAIL: 1
      XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
      XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
      IGNITION_LOCAL_SITES_PATH: '${PWD}'
    volumes:
      - '.:/var/www/html'
    networks:
      - sail
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      tika:
        condition: service_started
  queue:
    build:
      context: ./docker/app
      dockerfile: DockerfileQueue
      args:
        WWWGROUP: '${WWWGROUP}'
        DOCKER_GROUP_ID: '${DOCKER_GROUP_ID}'
    image: sail-8.4/app-queue
    command: [ "php", "/var/www/html/artisan", "queue:work", "--tries=3" ]
    environment:
      WWWUSER: '${WWWUSER}'
      DOCKER_GROUP_ID: "${DOCKER_GROUP_ID}"
      LARAVEL_SAIL: 1
      XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
      XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
      IGNITION_LOCAL_SITES_PATH: '${PWD}'
      LOG_CHANNEL: 'queue'
    group_add:
      - '${DOCKER_GROUP_ID}'
    volumes:
      - '.:/var/www/html'
      - '/var/run/docker.sock:/var/run/docker.sock'
    networks:
      - sail
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      tika:
        condition: service_started
      embedding:
        condition: service_healthy
    restart: on-failure

  # --- scheduler サービス ---
  scheduler:
    build:
      context: ./vendor/laravel/sail/runtimes/8.4
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP}'
    image: sail-8.4/app
    volumes:
      - .:/var/www/html
    command: [ "php", "/var/www/html/artisan", "schedule:work", "--no-interaction" ]
    environment:
      WWWUSER: '${WWWUSER}'
      LARAVEL_SAIL: 1
      XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
      XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
      IGNITION_LOCAL_SITES_PATH: '${PWD}'
      LOG_CHANNEL: 'scheduler'
    networks:
      - sail
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  mysql:
    image: 'groonga/mroonga:mysql-8.0-latest'
    platform: linux/amd64
    ports:
      - '${FORWARD_DB_PORT:-3306}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - 'sail-mysql:/var/lib/mysql'
      - './docker/mroonga/my.cnf/mroonga.cnf:/etc/mysql/conf.d/mroonga.cnf'
    networks:
      - sail
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}" ]
      retries: 3
      timeout: 5s
  redis:
    image: 'redis:alpine'
    ports:
      - '${FORWARD_REDIS_PORT:-6379}:6379'
    volumes:
      - 'sail-redis:/data'
    networks:
      - sail
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      retries: 3
      timeout: 5s
  tika:
    image: apache/tika:latest
    platform: linux/amd64
    ports:
      - 9998:9998
    restart: on-failure
    volumes:
      - './docker/tika/tika-config.xml:/tika-config.xml'
    networks:
      - sail
  ocrmypdf:
    build:
      context: ./docker/ocrmypdf
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    entrypoint: []
    command: tail -f /dev/null
    restart: unless-stopped
    networks:
      - sail
  embedding:
    platform: linux/amd64
    build:
      context: ./docker/embedding
      dockerfile: Dockerfile
    container_name: ledgerleap_embedding
    volumes:
      - ./storage/app/embedding:/app/models
    environment:
      - EMBEDDING_MODEL=cl-nagoya/ruri-v3-310m
      - USE_ONNX=false
      - CPU_THREADS=4
      - EMBEDDING_BATCH_SIZE=${RAG_BATCH_SIZE:-1}
      - RAG_NUM_THREADS=${RAG_NUM_THREADS:-0}
      - RAG_NUM_INTEROP_THREADS=${RAG_NUM_INTEROP_THREADS:-0}
      - RAG_CONVERT_TO_NUMPY=${RAG_CONVERT_TO_NUMPY:-true}
      - RAG_DEVICE=${RAG_DEVICE:-cpu}
    networks:
      - sail
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000", "--timeout-keep-alive", "300"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 300s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 2G

  vlm:
    platform: linux/amd64
    build:
      context: ${VLM_SERVICE_CONTEXT:-./docker/paddle} # Use environment variable to switch context, default to paddle
      dockerfile: Dockerfile
    container_name: ledgerleap_vlm
    ports:
      - "${VLM_SERVICE_PORT:-8001}:${VLM_INTERNAL_PORT:-8000}"
    volumes:
      - ./storage/vlm-cache:/root/.cache/huggingface
      - .:/var/www/html
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 10G
        reservations:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${VLM_INTERNAL_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s # Model download can be slow
    networks:
      - sail

networks:
  sail:
    driver: bridge
volumes:
  sail-mysql:
    driver: local
  sail-redis:
    driver: local